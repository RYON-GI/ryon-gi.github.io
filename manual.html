<script>
(function () {
  const PRIMARY  = ["민첩", "힘", "의지", "지능", "주요능력치"];
  const EXTRA    = ["공격력", "생명력", "물리피해", "열기피해", "전기피해", "냉기피해", "자연피해", "치명타확률", "아츠강도", "궁극기획득효율", "아츠피해", "치유효율"];
  const SPECIAL  = ["효율", "의료", "흐름", "어둠", "억제", "고통", "분쇄", "추격", "골절", "기예", "잔혹", "방출", "사기"];

  let selected = [];
  let oneOptMode = false;

  // ---- 보유 현황 불러오기/저장 ----
  let ownedWeapons = new Set();
  try {
    const saved = localStorage.getItem('endfield_owned_weapons');
    if (saved) ownedWeapons = new Set(JSON.parse(saved));
  } catch {}

  function saveOwned() {
    localStorage.setItem('endfield_owned_weapons', JSON.stringify([...ownedWeapons]));
  }

  function toggleOwned(name) {
    if (ownedWeapons.has(name)) {
      ownedWeapons.delete(name);
    } else {
      ownedWeapons.add(name);
    }
    saveOwned();
    updateResults();
  }

  // ---- 옵션 버튼 생성 ----
  function buildGroup(groupId, opts) {
    const container = document.getElementById(groupId);
    opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-select-btn';
      btn.textContent = opt;
      btn.dataset.opt = opt;
      btn.onclick = () => toggleOpt(opt);
      container.appendChild(btn);
    });
  }

  buildGroup('group-primary', PRIMARY);
  buildGroup('group-extra',   EXTRA);
  buildGroup('group-special', SPECIAL);

  // ---- 옵션 토글 ----
  window.toggleOpt = function(opt) {
    const idx = selected.indexOf(opt);
    if (idx !== -1) {
      selected.splice(idx, 1);
    } else {
      if (selected.length >= 3) return;
      selected.push(opt);
    }
    updateSlots();
    updateButtons();
    updateResults();
  };

  window.clearAll = function() {
    selected = [];
    updateSlots();
    updateButtons();
    updateResults();
  };

  // ---- 1옵션 모드 토글 ----
  window.toggleOneOpt = function() {
    oneOptMode = !oneOptMode;
    const btn = document.getElementById('btn-one-opt');
    if (oneOptMode) {
      btn.style.background = 'var(--primary)';
      btn.style.color = '#000';
    } else {
      btn.style.background = 'var(--red)';
      btn.style.color = '#fff';
    }
    updateResults();
  };

  // ---- 슬롯 표시 업데이트 ----
  function updateSlots() {
    for (let i = 1; i <= 3; i++) {
      const el = document.getElementById('slot-' + i);
      const val = selected[i - 1];
      el.textContent = val || ('옵션 ' + i);
      el.classList.toggle('filled', !!val);
    }
  }

  // ---- 버튼 하이라이트 ----
  function updateButtons() {
    document.querySelectorAll('.opt-select-btn').forEach(btn => {
      const isSelected = selected.includes(btn.dataset.opt);
      btn.classList.toggle('active', isSelected);
      btn.disabled = !isSelected && selected.length >= 3;
      btn.style.opacity = (!isSelected && selected.length >= 3) ? '0.4' : '';
    });
  }

  // ---- 결과 업데이트 ----
  function updateResults() {
    const list6 = document.getElementById('list-6star-manual');
    const list5 = document.getElementById('list-5star-manual');

    if (selected.length === 0) {
      const placeholder = '<div style="color:var(--text-muted); font-size:0.9em; padding:12px 0;">옵션을 선택하면 매칭 결과가 표시됩니다.</div>';
      list6.innerHTML = placeholder;
      list5.innerHTML = placeholder;
      return;
    }

    // 1옵션 모드: 추가/특수 능력치 중 1개만 선택해도 매칭
    const minMatch = (oneOptMode && selected.length === 1 && !PRIMARY.includes(selected[0])) ? 1 : 2;

    const render = (weapons, starPath, starPrefix, container) => {
      const matched = [];
      weapons.forEach(w => {
        const count = selected.filter(s => w.opts.includes(s)).length;
        if (count >= minMatch) matched.push({ w, count });
      });
      matched.sort((a, b) => b.count - a.count);

      if (matched.length === 0) {
        container.innerHTML = '<div style="color:var(--text-muted); font-size:0.9em; padding:12px 0;">매칭되는 무기가 없습니다.</div>';
        return;
      }

      container.innerHTML = '';
      matched.forEach(({ w, count }) => {
        const card = document.createElement('div');
        card.className = 'weapon-card' + (ownedWeapons.has(w.name) ? ' owned' : '');
        if (count === 3) card.style.borderColor = 'var(--gold)';
        card.style.cursor = 'pointer';
        card.onclick = () => toggleOwned(w.name);

        const safeName = w.name.replace(/:/g, '');
        card.innerHTML = `
          <div class="weapon-img-container">
            <img src="배경.png" class="layer bg-layer">
            <img src="${starPath}/${safeName}.png" class="layer weapon-layer" onerror="this.style.display='none'">
            <img src="${starPath}/${starPrefix} 하단.png" class="layer bottom-layer" onerror="this.style.display='none'">
          </div>
          <div>${w.name}</div>
          <div style="margin-top:4px;">
            <span class="match-badge" style="${count === 3 ? 'color:var(--gold);border-color:var(--gold);' : ''}">${count}개 일치</span>
          </div>
          <div style="margin-top:6px; font-size:0.75em; color:#666; line-height:1.5;">
            ${w.opts.map(o => `<span style="${selected.includes(o) ? 'color:var(--gold);font-weight:700;' : 'color:#555;'}">${o}</span>`).join(' · ')}
          </div>
        `;
        container.appendChild(card);
      });
    };

    render(WEAPONS_6, '6성 무기', '6성', list6);
    render(WEAPONS_5, '5성 무기', '5성', list5);
  }

  // 초기 실행
  updateSlots();
  updateButtons();
  updateResults();
})();
</script>
