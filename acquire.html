<style>
  #acquire-scan-layout { grid-template-columns: 450px 1fr; }
  #acquire-scan-layout .result-panel { padding-top: 34px; }
  #roi-controls { margin-top:10px; }
  .roi-group { background:rgba(0,0,0,0.22); border-radius:var(--radius-sm); border:1px solid var(--border); padding:8px 10px; margin-bottom:6px; }
  .roi-group-title { font-size:0.8em; font-weight:700; margin-bottom:6px; }
  .roi-2col { display:grid; grid-template-columns:1fr 1fr; gap:3px 10px; }
  .roi-row { display:grid; grid-template-columns:18px 1fr 70px; gap:4px; align-items:center; }
  .roi-row-opt { display:grid; grid-template-columns:36px 12px 1fr 70px 12px 1fr 70px; gap:3px; align-items:center; margin-bottom:5px; }
  .roi-xy-lbl { font-size:0.7em; color:var(--text-muted); font-weight:700; font-family:monospace; }
  .roi-label { font-size:0.75em; color:var(--text-muted); font-weight:700; font-family:monospace; }
  .roi-slider { width:100%; cursor:pointer; height:4px; }
  .roi-val-cell { display:inline-flex; align-items:center; gap:1px; }
  .roi-val { font-size:0.72em; font-family:monospace; color:var(--text); text-align:right; flex:1; }
  .roi-adj-btn { width:13px; height:14px; font-size:8px; padding:0; background:var(--panel2); border:1px solid var(--border2); color:var(--text-muted); cursor:pointer; border-radius:2px; text-align:center; line-height:14px; user-select:none; flex-shrink:0; }
  .roi-adj-btn:hover { color:var(--text); background:var(--border2); }
  .roi-io-row { display:flex; gap:6px; margin-top:8px; }
  .roi-io-row button { flex:1; font-size:0.8em; padding:5px 0; }
  .roi-preset-row { display:flex; gap:3px; flex-wrap:wrap; margin-bottom:6px; }
  .roi-preset-btn { flex:1; min-width:22px; padding:3px 2px; font-size:0.74em; background:var(--panel2); border:1px solid var(--border2); color:var(--text-muted); cursor:pointer; border-radius:3px; text-align:center; }
  .roi-preset-btn:hover { color:var(--text); background:var(--border2); }
  .roi-preset-btn.active { background:var(--primary); color:#000; border-color:var(--primary); }
</style>

<script>
(function initAcquireROI() {
  const DEFAULT_ROI = {
    roi:   { x:0.224, y:0.778, w:0.132, h:0.154 },
    boxes: [
      { x:0.14, y:0.01, w:0.83, h:0.16 },
      { x:0.14, y:0.34, w:0.83, h:0.16 },
      { x:0.14, y:0.68, w:0.83, h:0.16 }
    ]
  };
  const PRESETS_NORMAL = [
    { x:0.315, y:0.472, w:0.132, h:0.154 },
    { x:0.407, y:0.472, w:0.132, h:0.154 },
    { x:0.499, y:0.472, w:0.132, h:0.154 },
    { x:0.591, y:0.472, w:0.132, h:0.154 },
    { x:0.683, y:0.472, w:0.132, h:0.154 },
  ];
  const PRESETS_DOUBLE = [
    { x:0.224, y:0.778, w:0.132, h:0.154 },
    { x:0.316, y:0.778, w:0.132, h:0.154 },
    { x:0.407, y:0.778, w:0.132, h:0.154 },
    { x:0.502, y:0.778, w:0.132, h:0.154 },
    { x:0.591, y:0.778, w:0.132, h:0.154 },
    { x:0.682, y:0.778, w:0.132, h:0.154 },
    { x:0.464, y:0.778, w:0.132, h:0.154 },
    { x:0.555, y:0.778, w:0.132, h:0.154 },
    { x:0.224, y:0.472, w:0.132, h:0.154 },
    { x:0.315, y:0.472, w:0.132, h:0.154 },
  ];
  const STORAGE_KEY = 'endfield_acquire_roi';
  const currentROI = JSON.parse(JSON.stringify(DEFAULT_ROI));

  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) { const p=JSON.parse(s); Object.assign(currentROI.roi,p.roi); p.boxes.forEach((b,i)=>Object.assign(currentROI.boxes[i],b)); }
  } catch {}

  function applyToConfigs() {
    for (const mk of Object.keys(window.CONFIGS||{})) {
      if (window.CONFIGS[mk]?.BASE?.acquire) {
        window.CONFIGS[mk].BASE.acquire.roi   = {...currentROI.roi};
        window.CONFIGS[mk].BASE.acquire.boxes = currentROI.boxes.map(b=>({...b}));
      }
    }
  }
  function saveAndApply() { localStorage.setItem(STORAGE_KEY, JSON.stringify(currentROI)); applyToConfigs(); }

  function makeValCell(sld, obj, key, initVal) {
    const cell = document.createElement('div'); cell.className='roi-val-cell';
    const val = document.createElement('span'); val.className='roi-val'; val.textContent=initVal.toFixed(3);
    const bUp = document.createElement('button'); bUp.className='roi-adj-btn'; bUp.textContent='▲';
    const bDn = document.createElement('button'); bDn.className='roi-adj-btn'; bDn.textContent='▼';
    let _timer, _intv;
    function fire(d) {
      const v = Math.min(1, Math.max(0, parseFloat(sld.value) + d * 0.001));
      sld.value = v; obj[key] = v; val.textContent = v.toFixed(3); saveAndApply();
    }
    function startHold(d) { fire(d); _timer = setTimeout(() => { _intv = setInterval(() => fire(d), 60); }, 350); }
    function stopHold() { clearTimeout(_timer); clearInterval(_intv); }
    bUp.addEventListener('mousedown', e => { e.preventDefault(); startHold(+1); });
    bDn.addEventListener('mousedown', e => { e.preventDefault(); startHold(-1); });
    ['mouseup','mouseleave'].forEach(ev => { bUp.addEventListener(ev, stopHold); bDn.addEventListener(ev, stopHold); });
    bUp.addEventListener('touchstart', e => { e.preventDefault(); startHold(+1); }, {passive:false});
    bDn.addEventListener('touchstart', e => { e.preventDefault(); startHold(-1); }, {passive:false});
    bUp.addEventListener('touchend', stopHold); bDn.addEventListener('touchend', stopHold);
    cell.appendChild(val); cell.appendChild(bUp); cell.appendChild(bDn);
    return { cell, val };
  }

  function makePresetRow(presets, allRows) {
    const row = document.createElement('div'); row.className = 'roi-preset-row';
    presets.forEach((p, i) => {
      const btn = document.createElement('button'); btn.className = 'roi-preset-btn'; btn.textContent = i + 1;
      const isActive = Math.abs(currentROI.roi.x - p.x) < 0.001 && Math.abs(currentROI.roi.y - p.y) < 0.001;
      if (isActive) btn.classList.add('active');
      btn.onclick = () => {
        Object.assign(currentROI.roi, p);
        buildScreenSliders(); saveAndApply();
        allRows.forEach(r => r.querySelectorAll('.roi-preset-btn').forEach(b => b.classList.remove('active')));
        btn.classList.add('active');
      };
      row.appendChild(btn);
    });
    return row;
  }

  function buildPresetButtons() {
    const existing = document.getElementById('roi-preset-group');
    if (existing) existing.remove();
    const wrap = document.createElement('div'); wrap.id = 'roi-preset-group';

    // 일반 프리셋 그룹
    const grpNormal = document.createElement('div'); grpNormal.className = 'roi-group';
    const titleNormal = document.createElement('div');
    titleNormal.className = 'roi-group-title'; titleNormal.style.color = '#aaaaaa'; titleNormal.textContent = '아이템 위치 프리셋';
    grpNormal.appendChild(titleNormal);

    // 이성 2배 그룹 (접힘)
    const grpDouble = document.createElement('div'); grpDouble.className = 'roi-group';
    const header = document.createElement('div');
    header.style.cssText = 'display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none;';
    const titleDouble = document.createElement('div');
    titleDouble.className = 'roi-group-title'; titleDouble.style.cssText = 'color:#aaaaaa; margin-bottom:0;'; titleDouble.textContent = '이성 2배 사용';
    const arrow = document.createElement('span');
    arrow.style.cssText = 'font-size:0.75em; color:var(--text-muted);'; arrow.textContent = '▶';
    header.appendChild(titleDouble); header.appendChild(arrow);
    const doubleContent = document.createElement('div');
    doubleContent.style.cssText = 'display:none; margin-top:6px;';
    header.onclick = () => {
      const open = doubleContent.style.display !== 'none';
      doubleContent.style.display = open ? 'none' : 'block';
      arrow.textContent = open ? '▶' : '▼';
    };
    grpDouble.appendChild(header); grpDouble.appendChild(doubleContent);

    // 두 row 생성 (active 상태 공유를 위해 배열 먼저 선언)
    const allRows = [];
    const rowNormal = makePresetRow(PRESETS_NORMAL, allRows);
    const rowDouble = makePresetRow(PRESETS_DOUBLE, allRows);
    allRows.push(rowNormal, rowDouble);

    grpNormal.appendChild(rowNormal);
    doubleContent.appendChild(rowDouble);

    wrap.appendChild(grpNormal);
    wrap.appendChild(grpDouble);
    document.getElementById('roi-controls').insertBefore(wrap, document.getElementById('roi-group-screen'));
  }

  function buildScreenSliders() {
    const c = document.getElementById('roi-group-screen');
    c.querySelectorAll('.roi-2col').forEach(e=>e.remove());
    const grid = document.createElement('div'); grid.className='roi-2col';
    ['x','y','w','h'].forEach(k => {
      const row=document.createElement('div'); row.className='roi-row';
      const lbl=document.createElement('span'); lbl.className='roi-label'; lbl.textContent=({x:'↔',y:'↕',w:'W',h:'H'})[k];
      const sld=document.createElement('input'); sld.type='range'; sld.className='roi-slider';
      sld.min='0'; sld.max='1'; sld.step='0.001'; sld.value=currentROI.roi[k]; sld.style.accentColor='#aaa';
      const {cell, val} = makeValCell(sld, currentROI.roi, k, currentROI.roi[k]);
      sld.oninput=()=>{ currentROI.roi[k]=parseFloat(sld.value); val.textContent=currentROI.roi[k].toFixed(3); saveAndApply(); };
      row.appendChild(lbl); row.appendChild(sld); row.appendChild(cell); grid.appendChild(row);
    });
    c.appendChild(grid);
  }

  const OPT_COLORS = ['#4ade80','#f87171','#22d3ee'];
  const OPT_LABELS = ['옵션1','옵션2','옵션3'];
  function buildOptSliders() {
    const c = document.getElementById('roi-group-opts');
    c.querySelectorAll('.roi-row-opt').forEach(e=>e.remove());
    currentROI.boxes.forEach((box,i) => {
      const row=document.createElement('div'); row.className='roi-row-opt';

      const lbl=document.createElement('span'); lbl.style.cssText=`font-size:0.72em;font-weight:700;color:${OPT_COLORS[i]};`; lbl.textContent=OPT_LABELS[i];

      const xlbl=document.createElement('span'); xlbl.className='roi-xy-lbl'; xlbl.textContent='↔';
      const xsld=document.createElement('input'); xsld.type='range'; xsld.className='roi-slider';
      xsld.min='0'; xsld.max='1'; xsld.step='0.001'; xsld.value=box.x; xsld.style.accentColor=OPT_COLORS[i];
      const {cell: xcell, val: xval} = makeValCell(xsld, box, 'x', box.x);
      xsld.oninput=()=>{ box.x=parseFloat(xsld.value); xval.textContent=box.x.toFixed(3); saveAndApply(); };

      const ylbl=document.createElement('span'); ylbl.className='roi-xy-lbl'; ylbl.textContent='↕';
      const ysld=document.createElement('input'); ysld.type='range'; ysld.className='roi-slider';
      ysld.min='0'; ysld.max='1'; ysld.step='0.001'; ysld.value=box.y; ysld.style.accentColor=OPT_COLORS[i];
      const {cell: ycell, val: yval} = makeValCell(ysld, box, 'y', box.y);
      ysld.oninput=()=>{ box.y=parseFloat(ysld.value); yval.textContent=box.y.toFixed(3); saveAndApply(); };

      row.appendChild(lbl); row.appendChild(xlbl); row.appendChild(xsld); row.appendChild(xcell);
      row.appendChild(ylbl); row.appendChild(ysld); row.appendChild(ycell);
      c.appendChild(row);
    });
  }

  buildPresetButtons();
  buildScreenSliders();
  buildOptSliders();

  function buildIOPanel() {
    const panel = document.createElement('div');
    panel.style.cssText='margin-top:6px;';
    const row = document.createElement('div'); row.className='roi-io-row';

    const saveBtn = document.createElement('button');
    saveBtn.textContent='위치 저장'; saveBtn.style.background='var(--primary)'; saveBtn.style.color='#000';
    saveBtn.onclick=()=>{ saveAndApply(); saveBtn.textContent='저장 완료!'; setTimeout(()=>saveBtn.textContent='위치 저장',1500); };

    const loadBtn = document.createElement('button');
    loadBtn.textContent='위치 불러오기'; loadBtn.style.background='var(--panel2)'; loadBtn.style.color='var(--text)'; loadBtn.style.border='1px solid var(--border2)';
    loadBtn.onclick=()=>{
      const s=localStorage.getItem(STORAGE_KEY); if(!s){alert('저장된 ROI가 없습니다.');return;}
      const p=JSON.parse(s); Object.assign(currentROI.roi,p.roi); p.boxes.forEach((b,i)=>Object.assign(currentROI.boxes[i],b));
      buildScreenSliders(); buildOptSliders(); applyToConfigs();
      loadBtn.textContent='불러오기 완료!'; setTimeout(()=>loadBtn.textContent='위치 불러오기',1500);
    };

    row.appendChild(saveBtn); row.appendChild(loadBtn);
    panel.appendChild(row);
    document.getElementById('roi-controls').appendChild(panel);
  }
  buildIOPanel();

  window.resetAcquireROI = function() {
    Object.assign(currentROI.roi, DEFAULT_ROI.roi);
    DEFAULT_ROI.boxes.forEach((b,i)=>Object.assign(currentROI.boxes[i],b));
    buildPresetButtons(); buildScreenSliders(); buildOptSliders();
    localStorage.removeItem(STORAGE_KEY); applyToConfigs();
  };

  applyToConfigs();
})();
</script>
